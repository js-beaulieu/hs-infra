provider = "keycloak-oidc"
provider_display_name = "Homelab SSO"
http_address = "0.0.0.0:4180"
reverse_proxy = true
real_client_ip_header = "X-Real-IP"

scope = "openid email profile"
code_challenge_method = "S256"
oidc_groups_claim = "groups"
oidc_email_claim = "email"
allowed_groups = ["/homelab-users"]
email_domains = ["*"]

proxy_prefix = "/oauth2"
set_xauthrequest = true
pass_access_token = false
pass_authorization_header = false
pass_basic_auth = false
pass_user_headers = false
skip_auth_strip_headers = true

cookie_name = "__Secure-oauth2_proxy"
cookie_secure = true
cookie_httponly = true
cookie_samesite = "lax"
cookie_path = "/"
cookie_expire = "8h"
cookie_refresh = "1h"

session_store_type = "redis"
redis_connection_url = "redis://redis:6379/0"

upstreams = ["static://202"]
skip_provider_button = true
silence_ping_logging = true
