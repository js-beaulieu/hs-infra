version: "3"

vars:
  STACK_PROJECT_NAME: home-stack
  COMPOSE_FILES: -f docker/compose.yml -f docker/core.yml -f docker/tasks.yml -f docker/watchtower.yml
  VM_NAME: home-stack-local
  VM_STATE_DIR: .local/vm
  VM_HTTP_PORT: 8080
  VM_HTTPS_PORT: 8443
  VM_INVENTORY: ansible/inventories/local-vagrant/hosts.yml

tasks:
  start:
    desc: Start the stack
    cmds:
      - docker compose --project-name {{.STACK_PROJECT_NAME}} --env-file {{.STACK_ENV_FILE | default ".env"}} {{.COMPOSE_FILES}} up -d --build

  stop:
    desc: Stop the stack
    cmds:
      - docker compose --project-name {{.STACK_PROJECT_NAME}} --env-file {{.STACK_ENV_FILE | default ".env"}} {{.COMPOSE_FILES}} down

  vm:up:
    desc: Create/start the disposable local Vagrant/libvirt VM
    cmds:
      - >-
        VM_NAME={{.VM_NAME}}
        VM_HTTP_PORT={{.VM_HTTP_PORT}}
        VM_HTTPS_PORT={{.VM_HTTPS_PORT}}
        VAGRANT_DOTFILE_PATH={{.VM_STATE_DIR}}/vagrant
        vagrant up --provider=libvirt

  vm:status:
    desc: Show local Vagrant VM status
    cmds:
      - >-
        VM_NAME={{.VM_NAME}}
        VM_HTTP_PORT={{.VM_HTTP_PORT}}
        VM_HTTPS_PORT={{.VM_HTTPS_PORT}}
        VAGRANT_DOTFILE_PATH={{.VM_STATE_DIR}}/vagrant
        vagrant status

  vm:down:
    desc: Stop the disposable local Vagrant VM
    cmds:
      - >-
        VM_NAME={{.VM_NAME}}
        VM_HTTP_PORT={{.VM_HTTP_PORT}}
        VM_HTTPS_PORT={{.VM_HTTPS_PORT}}
        VAGRANT_DOTFILE_PATH={{.VM_STATE_DIR}}/vagrant
        vagrant halt

  vm:destroy:
    desc: Stop and remove local Vagrant VM state
    cmds:
      - >-
        VM_NAME={{.VM_NAME}}
        VM_HTTP_PORT={{.VM_HTTP_PORT}}
        VM_HTTPS_PORT={{.VM_HTTPS_PORT}}
        VAGRANT_DOTFILE_PATH={{.VM_STATE_DIR}}/vagrant
        vagrant destroy -f
      - rm -rf {{.VM_STATE_DIR}}

  vm:ssh-config:
    desc: Write local Vagrant SSH config for Ansible
    cmds:
      - |
        mkdir -p {{.VM_STATE_DIR}}
        VM_NAME={{.VM_NAME}} \
        VM_HTTP_PORT={{.VM_HTTP_PORT}} \
        VM_HTTPS_PORT={{.VM_HTTPS_PORT}} \
        VAGRANT_DOTFILE_PATH={{.VM_STATE_DIR}}/vagrant \
        vagrant ssh-config {{.VM_NAME}} | sed 's/^Host .*/Host local-vm/' > {{.VM_STATE_DIR}}/ssh-config

  vm:check-certs:
    desc: Ensure local VM TLS files exist
    cmds:
      - |
        test -f certs/local.pem && test -f certs/local-key.pem && test -f certs/rootCA.pem || {
          printf '%s\n' 'Missing certs/local.pem, certs/local-key.pem, or certs/rootCA.pem.' >&2
          printf '%s\n' 'Run the mkcert commands documented in README.md before vm:deploy.' >&2
          exit 1
        }

  vm:provision:
    desc: Run bootstrap and site playbooks against the local VM
    deps: [vm:ssh-config]
    cmds:
      - |
        key_file="$(awk '$1 == "IdentityFile" { print $2 }' {{.VM_STATE_DIR}}/ssh-config | tr -d '"')"
        export HOME_STACK_LOCAL_VM_DEPLOY_AUTHORIZED_KEY="$(ssh-keygen -y -f "$key_file")"
        export VM_HTTP_PORT={{.VM_HTTP_PORT}}
        export VM_HTTPS_PORT={{.VM_HTTPS_PORT}}
        uv run --group dev ansible-playbook -i {{.VM_INVENTORY}} ansible/playbooks/bootstrap.yml
        uv run --group dev ansible-playbook -i {{.VM_INVENTORY}} ansible/playbooks/site.yml

  vm:deploy:
    desc: Sync this checkout and deploy it to the local VM
    deps: [vm:ssh-config, vm:check-certs]
    cmds:
      - >-
        VM_NAME={{.VM_NAME}}
        VM_HTTP_PORT={{.VM_HTTP_PORT}}
        VM_HTTPS_PORT={{.VM_HTTPS_PORT}}
        VAGRANT_DOTFILE_PATH={{.VM_STATE_DIR}}/vagrant
        vagrant rsync
      - |
        key_file="$(awk '$1 == "IdentityFile" { print $2 }' {{.VM_STATE_DIR}}/ssh-config | tr -d '"')"
        export HOME_STACK_LOCAL_VM_DEPLOY_AUTHORIZED_KEY="$(ssh-keygen -y -f "$key_file")"
        export VM_HTTP_PORT={{.VM_HTTP_PORT}}
        export VM_HTTPS_PORT={{.VM_HTTPS_PORT}}
        uv run --group dev ansible-playbook -i {{.VM_INVENTORY}} ansible/playbooks/deploy.yml

  vm:test:
    desc: Run local VM smoke checks
    cmds:
      - |
        for _ in $(seq 1 60); do
          if curl -kfsS https://api.home-stack.localhost:{{.VM_HTTPS_PORT}}/tasks/health; then
            exit 0
          fi
          sleep 2
        done
        exit 1
      - |
        for _ in $(seq 1 60); do
          if curl -kfsS https://auth.home-stack.localhost:{{.VM_HTTPS_PORT}}/realms/home-stack/.well-known/openid-configuration >/dev/null; then
            exit 0
          fi
          sleep 2
        done
        exit 1
      - |
        status="$(curl -ksS -o /dev/null -w '%{http_code}' https://auth.home-stack.localhost:{{.VM_HTTPS_PORT}}/realms/master/.well-known/openid-configuration)"
        test "$status" = "404"

  sops:keygen:
    desc: Generate an age key pair and write it into ~/.config/sops/age/keys.txt and .sops.yaml
    cmds:
      - mkdir -p ~/.config/sops/age
      - age-keygen -o ~/.config/sops/age/keys.txt
      - chmod 600 ~/.config/sops/age/keys.txt
      - cp .sops.yaml.example .sops.yaml
      - |
        pub_key="$(grep '# public key' ~/.config/sops/age/keys.txt | sed 's/.*: //')"
        sed -i "s|age1replacewithyourproductionrecipient0000000000000000000000000000000|${pub_key}|" .sops.yaml
        printf '\nPublic key: %s\n' "$pub_key"
        printf 'Updated .sops.yaml with your age recipient.\n'

  sops:edit:
    desc: Edit the production vault in place (decrypts, opens $EDITOR, re-encrypts on save)
    cmds:
      - sops ansible/inventories/production/group_vars/all/vault.sops.yml

  sops:view:
    desc: Decrypt and print the production vault to stdout
    cmds:
      - sops --decrypt ansible/inventories/production/group_vars/all/vault.sops.yml

  sops:get:
    desc: "Print a single vault value (usage: task sops:get -- home_stack_domain)"
    cmds:
      - |
        sops --decrypt --extract '["{{.CLI_ARGS}}"]' ansible/inventories/production/group_vars/all/vault.sops.yml

  sops:encrypt:
    desc: Encrypt the production vault file in place
    cmds:
      - sops --encrypt --in-place ansible/inventories/production/group_vars/all/vault.sops.yml

  test:
    desc: Run isolated Testcontainers flow tests
    cmds:
      - bash scripts/run-flow-tests.sh {{.CLI_ARGS | default "tests/flows/testcontainers.env.example"}}

  lint:
    desc: Run all config validations
    deps: [lint:compose, lint:caddy, lint:oauth2-proxy, lint:agentgateway, lint:github-actions, lint:sh]

  lint:compose:
    desc: Validate Docker Compose config
    cmds:
      - docker compose --project-name {{.STACK_PROJECT_NAME}} --env-file {{.STACK_ENV_FILE | default ".env"}} {{.COMPOSE_FILES}} config --quiet

  lint:caddy:
    desc: Validate Caddy config
    cmds:
      - |
        docker build -t caddy-cloudflare:2-alpine caddy
        docker run --rm \
          -v $PWD/caddy:/etc/caddy:ro \
          -e ACME_EMAIL=test@localhost \
          -e CADDY_TLS_INCLUDE="tls_internal.caddy" \
          -e CF_API_TOKEN=lint-only-dummy-token \
          -e CADDY_TRUSTED_PROXIES="127.0.0.1/32" \
          -e DOMAIN=localhost \
          -e PUBLIC_WEB_ORIGIN=https://tasks.localhost \
          -e PUBLIC_OAUTH2_ORIGIN=https://api.localhost \
          -e KEYCLOAK_ADMIN_REMOTE_IP_RANGES="private_ranges" \
          -e KEYCLOAK_ADMIN_CLIENT_IP_RANGES="private_ranges" \
          caddy-cloudflare:2-alpine caddy validate --config /etc/caddy/Caddyfile

  lint:oauth2-proxy:
    desc: Validate oauth2-proxy config
    cmds:
      - |
        docker run --rm \
          -v $PWD/oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro \
          -e OAUTH2_PROXY_CLIENT_ID=test \
          -e OAUTH2_PROXY_CLIENT_SECRET=test \
          -e OAUTH2_PROXY_COOKIE_SECRET=$(openssl rand -base64 32 | tr '+/' '-_') \
          -e OAUTH2_PROXY_REDIRECT_URL=https://test.local/oauth2/callback \
          -e OAUTH2_PROXY_OIDC_ISSUER_URL=https://test.local/realms/test \
          -e OAUTH2_PROXY_COOKIE_DOMAINS=.test.local \
          -e OAUTH2_PROXY_SESSION_STORE_TYPE=cookie \
          quay.io/oauth2-proxy/oauth2-proxy:v7.15.1 \
          --config /etc/oauth2-proxy/oauth2-proxy.cfg --config-test

  lint:agentgateway:
    desc: Validate agentgateway config
    cmds:
      - |
        tmpdir="$(mktemp -d)"
        trap 'rm -rf "$tmpdir"' EXIT
        chmod 755 "$tmpdir"
        echo '{"keys":[]}' > "$tmpdir/jwks.json"
        sed \
          -e 's|\${AGENTGATEWAY_ISSUER}|https://auth.test.local/realms/home-stack|g' \
          -e 's|\${AGENTGATEWAY_JWKS_URL}|https://auth.test.local/realms/home-stack/protocol/openid-connect/certs|g' \
          -e 's|\${MCP_RESOURCE_URI}|https://api.test.local/tasks/mcp|g' \
          -e 's|url: "https://auth.test.local/realms/home-stack/protocol/openid-connect/certs"|file: "/etc/agentgateway/jwks.json"|g' \
          agentgateway/config.yaml.tmpl > "$tmpdir/config.yaml"
        chmod 644 "$tmpdir/jwks.json" "$tmpdir/config.yaml"
        docker run --rm \
          -v "$tmpdir:/etc/agentgateway:ro" \
          cr.agentgateway.dev/agentgateway:v1.2.1 \
          -f /etc/agentgateway/config.yaml --validate-only

  lint:sh:
    desc: Shellcheck scripts
    cmds:
      - |
        uv run shellcheck --severity=warning \
          keycloak/bootstrap.sh \
          agentgateway/bootstrap.sh \
          postgres/bootstrap.sh \
          scripts/run-flow-tests.sh

  lint:github-actions:
    desc: Validate GitHub Actions workflows
    cmds:
      - >-
        docker run --rm
        -v $PWD:/repo:ro
        -w /repo
        rhysd/actionlint:1.7.7

  format:
    desc: Check formatting (Python, YAML, Markdown)
    cmds:
      - uv run ruff format --check .
      - uv run ruff check .
      - uv run yamlfix --check --exclude '**/*.sops.yml' --exclude '.sops.yaml' ansible/
      - uv run mdformat --check *.md

  format:write:
    desc: Format files in-place (Python, YAML, Markdown)
    cmds:
      - uv run ruff format .
      - uv run ruff check --fix .
      - uv run yamlfix --exclude '**/*.sops.yml' --exclude '.sops.yaml' ansible/
      - uv run mdformat *.md

  ci:
    desc: Run test, lint, and format
    deps: [test, lint, format]
