x-security-defaults: &security_defaults
  security_opt:
    - no-new-privileges:true

services:
  caddy:
    <<: *security_defaults
    image: caddy:2-alpine
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      PUBLIC_WEB_ORIGIN: ${PUBLIC_WEB_ORIGIN:-https://tasks.${DOMAIN}}
      PUBLIC_OAUTH2_ORIGIN: ${PUBLIC_OAUTH2_ORIGIN:-https://api.${DOMAIN}}
      CADDY_TLS_DIRECTIVE: ${CADDY_TLS_DIRECTIVE:-}
      CADDY_TRUSTED_PROXIES: ${CADDY_TRUSTED_PROXIES}
      KEYCLOAK_ADMIN_REMOTE_IP_RANGES: ${KEYCLOAK_ADMIN_REMOTE_IP_RANGES}
      KEYCLOAK_ADMIN_CLIENT_IP_RANGES: ${KEYCLOAK_ADMIN_CLIENT_IP_RANGES}
    volumes:
      - ../caddy:/etc/caddy:ro
      - ../certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      edge:
      auth:
        aliases:
          - auth.${DOMAIN}

  keycloak:
    <<: *security_defaults
    image: quay.io/keycloak/keycloak:26.1
    restart: unless-stopped
    command: ["start"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: ${PUBLIC_AUTH_ORIGIN:-https://auth.${DOMAIN}}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
    networks:
      auth:
      auth-db:
    volumes:
      - ../keycloak/healthcheck.sh:/healthcheck.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "sh /healthcheck.sh"]
      interval: 5s
      timeout: 3s
      retries: 15
    depends_on:
      postgres:
        condition: service_healthy

  keycloak-bootstrap:
    <<: *security_defaults
    image: quay.io/keycloak/keycloak:26.1
    restart: "no"
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    environment:
      DOMAIN: ${DOMAIN}
      PUBLIC_WEB_ORIGIN: ${PUBLIC_WEB_ORIGIN:-https://tasks.${DOMAIN}}
      PUBLIC_OAUTH2_ORIGIN: ${PUBLIC_OAUTH2_ORIGIN:-https://api.${DOMAIN}}
      PUBLIC_API_ORIGIN: ${PUBLIC_API_ORIGIN:-https://api.${DOMAIN}/tasks}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      MCP_RESOURCE_URI: ${MCP_RESOURCE_URI:-https://api.${DOMAIN}/tasks/mcp}
      MCP_ACCESS_TOKEN_LIFESPAN_SECONDS: ${MCP_ACCESS_TOKEN_LIFESPAN_SECONDS:-31536000}
      OAUTH2_PROXY_ACCESS_TOKEN_LIFESPAN_SECONDS: ${OAUTH2_PROXY_ACCESS_TOKEN_LIFESPAN_SECONDS:-300}
    volumes:
      - ../keycloak/bootstrap.sh:/bootstrap.sh:ro
    networks:
      auth:
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy

  postgres:
    <<: *security_defaults
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      TASKS_DB_NAME: ${TASKS_DB_NAME}
      TASKS_DB_USER: ${TASKS_DB_USER}
      TASKS_DB_PASSWORD: ${TASKS_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      auth-db:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    <<: *security_defaults
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      auth-session:

  oauth2-proxy:
    <<: *security_defaults
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.1
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    command: ["--config", "/etc/oauth2-proxy/oauth2-proxy.cfg"]
    environment:
      OAUTH2_PROXY_CLIENT_ID: oauth2-proxy-tasks
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_DOMAINS: .${DOMAIN}
      OAUTH2_PROXY_REDIRECT_URL: ${PUBLIC_OAUTH2_ORIGIN:-https://api.${DOMAIN}}/oauth2/callback
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${PUBLIC_AUTH_ORIGIN:-https://auth.${DOMAIN}}/realms/home-stack
      OAUTH2_PROXY_PROVIDER_CA_FILES: ${OAUTH2_PROXY_PROVIDER_CA_FILES:-}
      OAUTH2_PROXY_WHITELIST_DOMAINS: ${OAUTH2_PROXY_WHITELIST_DOMAINS:-.${DOMAIN}}
    extra_hosts:
      - auth.${DOMAIN}:host-gateway
    volumes:
      - ../oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
      - ../certs:/certs:ro
    networks:
      auth:
      auth-session:
    depends_on:
      redis:
        condition: service_started
      keycloak-bootstrap:
        condition: service_completed_successfully

  agentgateway:
    <<: *security_defaults
    image: cr.agentgateway.dev/agentgateway:v1.2.1
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    command: ["-f", "/etc/agentgateway/config.yaml"]
    environment:
      SSL_CERT_FILE: ${AGENTGATEWAY_SSL_CERT_FILE:-}
    extra_hosts:
      - auth.${DOMAIN}:host-gateway
    volumes:
      - agentgateway_config:/etc/agentgateway:ro
      - ../certs:/certs:ro
    networks:
      auth:
    depends_on:
      agentgateway-bootstrap:
        condition: service_completed_successfully
      keycloak-bootstrap:
        condition: service_completed_successfully

  agentgateway-bootstrap:
    <<: *security_defaults
    image: alpine:3.20
    restart: "no"
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    environment:
      AGENTGATEWAY_ISSUER: ${PUBLIC_AUTH_ORIGIN:-https://auth.${DOMAIN}}/realms/home-stack
      AGENTGATEWAY_JWKS_URL: http://keycloak:8080/realms/home-stack/protocol/openid-connect/certs
      MCP_RESOURCE_URI: ${MCP_RESOURCE_URI:-https://api.${DOMAIN}/tasks/mcp}
      AGENTGATEWAY_CONFIG_TMPL: /etc/agentgateway/config.yaml.tmpl
      AGENTGATEWAY_CONFIG_OUT: /etc/agentgateway/config.yaml
    volumes:
      - ../agentgateway/config.yaml.tmpl:/etc/agentgateway/config.yaml.tmpl:ro
      - ../agentgateway/bootstrap.sh:/bootstrap.sh:ro
      - agentgateway_config:/etc/agentgateway
    network_mode: none

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  agentgateway_config:

networks:
  edge:
  auth:
  auth-db:
  auth-session:
