x-security-defaults: &security_defaults
  security_opt:
    - no-new-privileges:true

services:
  caddy:
    networks:
      hs-api-tasks:
      hs-app-tasks:

  postgres:
    networks:
      tasks-db:

  postgres-bootstrap:
    <<: *security_defaults
    image: postgres:17-alpine
    restart: "no"
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      TASKS_DB_NAME: ${TASKS_DB_NAME}
      TASKS_DB_USER: ${TASKS_DB_USER}
      TASKS_DB_PASSWORD: ${TASKS_DB_PASSWORD}
    volumes:
      - ../postgres/bootstrap.sh:/bootstrap.sh:ro
    networks:
      auth-db:
    depends_on:
      postgres:
        condition: service_healthy

  agentgateway:
    networks:
      hs-api-tasks:
    depends_on:
      hs-api-tasks:
        condition: service_started

  hs-api-tasks:
    <<: *security_defaults
    image: ghcr.io/js-beaulieu/hs-api-tasks:latest
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      PG_CONNECTION_STRING: "host=postgres port=5432 user=${TASKS_DB_USER} password=${TASKS_DB_PASSWORD} dbname=${TASKS_DB_NAME} sslmode=disable"
      PORT: 8080
    networks:
      tasks-db:
      hs-api-tasks:
    depends_on:
      postgres:
        condition: service_healthy
      postgres-bootstrap:
        condition: service_completed_successfully

  hs-app-tasks:
    <<: *security_defaults
    image: ghcr.io/js-beaulieu/hs-app-tasks:latest
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      hs-app-tasks:

networks:
  hs-api-tasks:
  hs-app-tasks:
  tasks-db:
