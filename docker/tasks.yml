x-security-defaults: &security_defaults
  security_opt:
    - no-new-privileges:true

services:
  caddy:
    networks:
      tasks-api:
      tasks-web:

  postgres:
    networks:
      tasks-db:

  postgres-bootstrap:
    <<: *security_defaults
    image: postgres:17-alpine
    restart: "no"
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      TASKS_DB_NAME: ${TASKS_DB_NAME}
      TASKS_DB_USER: ${TASKS_DB_USER}
      TASKS_DB_PASSWORD: ${TASKS_DB_PASSWORD}
    volumes:
      - ../postgres/bootstrap.sh:/bootstrap.sh:ro
    networks:
      auth-db:
    depends_on:
      postgres:
        condition: service_healthy

  agentgateway:
    networks:
      tasks-api:
    depends_on:
      tasks-api:
        condition: service_started

  tasks-api:
    <<: *security_defaults
    image: ghcr.io/js-beaulieu/tasks-api:latest
    labels:
      - com.centurylinklabs.watchtower.enable=true
    restart: unless-stopped
    environment:
      PG_CONNECTION_STRING: "host=postgres port=5432 user=${TASKS_DB_USER} password=${TASKS_DB_PASSWORD} dbname=${TASKS_DB_NAME} sslmode=disable"
      PORT: 8080
    networks:
      tasks-db:
      tasks-api:
    depends_on:
      postgres:
        condition: service_healthy
      postgres-bootstrap:
        condition: service_completed_successfully

  tasks-web:
    <<: *security_defaults
    image: ghcr.io/js-beaulieu/tasks-web:latest
    labels:
      - com.centurylinklabs.watchtower.enable=true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      tasks-web:

networks:
  tasks-api:
  tasks-web:
  tasks-db:
