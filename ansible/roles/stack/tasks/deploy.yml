---
- name: Require supported source mode
  ansible.builtin.assert:
    that: ['home_stack_source_mode in ["git", "mounted", "local_copy"]']
    fail_msg: home_stack_source_mode must be 'git', 'mounted', or 'local_copy'.
- name: Require Git source configuration
  ansible.builtin.assert:
    that:
      - home_stack_git_repo | length > 0
      - home_stack_git_version | length > 0
      - >-
        not (home_stack_env_file == home_stack_app_dir or
        home_stack_env_file.startswith(home_stack_app_dir ~ '/'))
    fail_msg: Git deploys require home_stack_git_repo, home_stack_git_version, and
      an env file outside home_stack_app_dir.
  when: home_stack_source_mode == "git"
- name: Ensure release file directory exists
  ansible.builtin.file:
    path: '{{ home_stack_release_file | dirname }}'
    state: directory
    mode: '0750'
  when: home_stack_source_mode == "git"
- name: Render desired Git release marker
  ansible.builtin.copy:
    dest: '{{ home_stack_release_file }}'
    content: "{{ home_stack_git_version }}\n"
    mode: '0640'
  when: home_stack_source_mode == "git"
- name: Check environment file directory
  ansible.builtin.stat:
    path: '{{ home_stack_env_file | dirname }}'
  register: home_stack_env_dir_stat
- name: Create environment file directory when missing
  ansible.builtin.file:
    path: '{{ home_stack_env_file | dirname }}'
    state: directory
    mode: '0750'
  when: not (home_stack_env_dir_stat.stat.exists | default(false))
- name: Recheck environment file directory
  ansible.builtin.stat:
    path: '{{ home_stack_env_file | dirname }}'
  register: home_stack_env_dir_stat
- name: Require environment file directory
  ansible.builtin.assert:
    that: [home_stack_env_dir_stat.stat.isdir | default(false)]
    fail_msg: '{{ home_stack_env_file | dirname }} must be an existing directory
      writable by {{ home_stack_deploy_user }}.'
- name: Render deploy wrapper
  ansible.builtin.template:
    src: home-stack-deploy.j2
    dest: /usr/local/sbin/home-stack-deploy
    owner: root
    group: root
    mode: '0750'
  become: true
- name: Render production environment file
  ansible.builtin.template:
    src: env.j2
    dest: '{{ home_stack_env_file }}'
    mode: '0600'
  no_log: '{{ home_stack_hide_secrets }}'
- name: Run root-owned deployment wrapper
  ansible.builtin.command: sudo -n /usr/local/sbin/home-stack-deploy
  changed_when: true
