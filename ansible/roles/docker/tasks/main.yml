---
- name: Install Docker repository prerequisites
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg]
    state: present
    update_cache: true
- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'
- name: Install Docker apt signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: '0644'
- name: Configure Docker apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: https://download.docker.com/linux/debian
    suites: ['{{ home_stack_docker_apt_release }}']
    components: [stable]
    architectures:
      - "{{ 'amd64' if ansible_facts.architecture == 'x86_64' else ansible_facts.architecture }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present
- name: Refresh apt cache after Docker repository change
  ansible.builtin.apt:
    update_cache: true
- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - containerd.io
      - docker-buildx-plugin
      - docker-ce
      - docker-ce-cli
      - docker-compose-plugin
    state: present
- name: Configure Docker daemon log rotation
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "5"
        }
      }
  notify: Restart docker
- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
