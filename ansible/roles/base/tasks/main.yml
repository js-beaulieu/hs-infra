---
- name: Require Debian 13
  ansible.builtin.assert:
    that:
      - ansible_facts.distribution == "Debian"
      - ansible_facts.distribution_major_version == "13"
    fail_msg: This deployment currently targets Debian 13 only.
- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
- name: Install base packages
  ansible.builtin.apt:
    name: '{{ home_stack_base_packages }}'
    state: present
- name: Set system timezone
  community.general.timezone:
    name: '{{ home_stack_timezone }}'
- name: Configure unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52home-stack-unattended-upgrades
    owner: root
    group: root
    mode: '0644'
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      Unattended-Upgrade::Origins-Pattern {
        "origin=Debian,codename=${distro_codename},label=Debian-Security";
        "origin=Debian,codename=${distro_codename}-security,label=Debian-Security";
      };
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
- name: Apply conservative network sysctl hardening
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-home-stack-hardening.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv4.conf.default.accept_redirects = 0
      net.ipv6.conf.all.accept_redirects = 0
      net.ipv6.conf.default.accept_redirects = 0
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.default.send_redirects = 0
      net.ipv4.tcp_syncookies = 1
  notify: Apply sysctl settings
