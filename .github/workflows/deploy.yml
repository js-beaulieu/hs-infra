name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-caddy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    outputs:
      changed: ${{ steps.filter.outputs.caddy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Check if Caddy image changed
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            caddy:
              - caddy/Dockerfile

      - name: Set up Docker Buildx
        if: steps.filter.outputs.caddy == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.filter.outputs.caddy == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.filter.outputs.caddy == 'true'
        uses: docker/build-push-action@v7
        with:
          context: caddy
          push: true
          tags: ghcr.io/js-beaulieu/caddy-cloudflare:2-alpine
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-caddy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install project runtime dependencies
        run: uv sync --locked --no-dev

      - name: Cache Ansible collections
        uses: actions/cache@v5.0.5
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ runner.os }}-${{ hashFiles('ansible/requirements.yml') }}

      - name: Install Ansible collections
        run: uv run ansible-galaxy collection install -r ansible/requirements.yml

      - name: Install age
        uses: alessiodionisi/setup-age-action@v1.4.0
        with:
          version: 1.1.1

      - name: Install sops
        uses: nhedger/setup-sops@v2.1.1
        with:
          version: 3.13.1

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust known hosts
        run: ssh-keyscan -H "${{ vars.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy stack
        env:
          ANSIBLE_SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          GIT_REPO: ${{ vars.GIT_REPO || format('{0}/{1}', github.server_url, github.repository) }}
        run: uv run ansible-playbook -i ansible/inventories/production/hosts.github-actions.yml ansible/playbooks/deploy.yml