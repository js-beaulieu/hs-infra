name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  ci:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Install project tooling
        run: uv sync --locked

      - name: Install Playwright browser
        run: uv run --group dev playwright install --with-deps chromium

      - name: Install Ansible collections
        run: uv run ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run formatting checks
        run: task format

      - name: Run stack config validations
        run: task lint STACK_ENV_FILE=.env.example

      - name: Run Ansible syntax checks
        run: |
          uv run ansible-playbook -i ansible/inventories/ci/hosts.yml ansible/playbooks/bootstrap.yml --syntax-check
          uv run ansible-playbook -i ansible/inventories/ci/hosts.yml ansible/playbooks/site.yml --syntax-check
          uv run ansible-playbook -i ansible/inventories/ci/hosts.yml ansible/playbooks/deploy.yml --syntax-check

      - name: Run ansible-lint
        run: uv run ansible-lint ansible/playbooks

      - name: Run isolated flow tests
        run: task test