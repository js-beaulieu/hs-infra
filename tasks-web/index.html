<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Homelab Tasks</title>
    <style>
      :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0c111d; color: #e7edf8; }
      main { width: min(680px, calc(100vw - 32px)); padding: 40px; border: 1px solid #263246; border-radius: 28px; background: linear-gradient(135deg, #111827, #141b2f); box-shadow: 0 28px 80px #0008; }
      h1 { margin: 0 0 12px; font-size: clamp(2rem, 6vw, 4.5rem); line-height: .9; letter-spacing: -0.06em; }
      p { margin: 0; color: #aebbd0; font-size: 1.05rem; line-height: 1.6; }
      code { color: #91cdfb; }
    </style>
  </head>
  <body>
    <main>
      <h1>Tasks is behind SSO.</h1>
      <p>This static placeholder is served by <code>tasks-web</code>. API traffic is private on <code>/api</code>, MCP traffic is isolated on <code>/api/mcp</code>, and neither route is served by this web container.</p>
    </main>
  </body>
</html>
